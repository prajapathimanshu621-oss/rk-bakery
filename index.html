<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RK Bakery</title>

<link rel="manifest" href="manifest.json">

<style>
body{
font-family:Arial;
text-align:center;
background:#fff2f5;
padding:20px;
}

h1{
color:#ff2e63;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
background:#ff2e63;
color:white;
border:none;
border-radius:6px;
}

.card{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>RK BAKERY</h1>
<p>Fresh Cakes Available</p>

<div class="card">
<h3>Chocolate Cake</h3>
<p>₹500</p>
</div>

<div class="card">
<h3>Strawberry Cake</h3>
<p>₹600</p>
</div>

<button onclick="order()">Order on WhatsApp</button>
<button onclick="map()">Bakery Location</button>

<br><br>

<button id="installBtn">Download App</button>

<script>

function order(){
window.open("https://wa.me/916378467476?text=Hello RK Bakery I want to order cake");
}

function map(){
window.open("https://maps.google.com/?q=26.8818326,75.2389793");
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
});

document.getElementById("installBtn").addEventListener("click", () => {
if(deferredPrompt){
deferredPrompt.prompt();
}
});

</script>

</body>
</html>
